bio: |
  Alyson Palmquist is a temporary SURE student and Research Assistant in Prof. Angela Violi's lab, where she works on collecting and processing technical publications and grants, using natural language processing to create structured databases, and developing an AI-Driven Researcher Profiling and Collaboration Engine.

  Alyson connected with Prof. Angela Violi's lab through the SURE program and presented her work at the SURE student showcase.

  She is interested in all stages of working with data, from designing the acquisition methods to cleaning the data to creating polished presentations on analyses.
