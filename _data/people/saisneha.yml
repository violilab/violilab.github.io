bio: |
  Sai Sneha S V is a Research Assistant in Prof. Angela Violi's lab, where she works on an interactive tool that visualizes the MechE faculty publication corpus to help surface connections across research areas.

  Sneha is pursuing an MS in Data Science at the University of Michigan. Her interests span machine learning, natural language processing, and building data-driven systems, with a particular focus on applying GenAI and agentic workflows to real-world engineering problems. Before Michigan, she spent four years as a Software Developer at IBM, where she worked on semantic search, GenAI applications, and large-scale data systems. She also serves as a Software Engineering Intern at Mcity, contributing to an agentic data engine for autonomous vehicle research.
